# Loom configuration. Copy to loom.toml and edit.
# Env vars (see .env.example) override anything set here.

[loom]
# "vertex" for Claude on Vertex AI, "openrouter" for OpenRouter.ai.
provider = "vertex"
# Claude Opus 4.6 supports up to 128,000 output tokens. This is a HARD CAP,
# not a target - the model stops when it's done, you only pay for what it
# actually emits. 128000 is a sensible default for a long-running coder.
max_tokens = 128000
temperature = 0.4
max_agent_steps = 30
# Where to look for *.md skill files (relative to your cwd).
skills_dir = ".loom/skills"
# Terminal colors. Mimics Claude Code's accent palette.
# Values: "auto" (default; on if stdout is a TTY and NO_COLOR is not set),
#         "on" / "true" / "dark"  - force dark theme,
#         "light"                 - force light theme,
#         "off" / "false" / "none" - never colorize.
# You can also set LOOM_COLOR in the environment.
color = "auto"
# Word-wrap streaming LLM output to fit the terminal. Code fences (```)
# are preserved verbatim. Values:
#   "auto"  (default; uses the current terminal columns at each turn)
#   "off"   no wrapping (legacy behaviour)
#   <int>   fixed column count, e.g. 100
# Override at runtime with LOOM_WRAP=...
wrap = "auto"

# --- TLS settings (apply to Vault, Vertex, and OpenRouter) ---
# If your network has TLS interception (corporate proxy), point this at
# the proxy's CA bundle file. This is the *correct* fix for SSLError.
# tls_ca_bundle = "/path/to/corporate-ca.pem"
#
# Last resort: disable verification entirely. Loom will print a loud warning
# at startup. Prefer tls_ca_bundle wherever possible.
# tls_verify = false

[openrouter]
# api_key supplied via OPENROUTER_API_KEY env var.
model = "anthropic/claude-opus-4.7"
base_url = "https://openrouter.ai/api/v1"

[vertex]
# project_id / region / model can also come from VERTEX_* env vars.
project_id = ""
region = "us-east5"
model = "claude-opus-4-6"

[vault]
# Used only when provider = "vertex".
# All of these can also be set via VAULT_* env vars.
url = ""
namespace = ""
role_id = ""
# secret_id should normally come from VAULT_SECRET_ID env var, never the file.
secret_id = ""
# Path to the secret to read after AppRole login. Typical Vault GCP secrets
# engine roleset path: "gcp/token/<roleset>". Loom auto-detects an OAuth token
# under data.token / data.access_token in the response.
token_path = ""
# AppRole mount path (rarely changed).
approle_mount = "approle"

# Vault-only TLS overrides. Useful when your Vault server uses an internal
# CA your machine doesn't trust, but you DON'T want to weaken verification
# for external services like Vertex/OpenRouter.
# tls_ca_bundle = "/path/to/internal-vault-ca.pem"
# tls_verify = false   # last resort

# --- Optional: real MCP servers (stdio transport) ---
# Each entry spawns a subprocess and exposes its tools to the agent.
